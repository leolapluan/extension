<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Tips</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #110a0a;
            --bg2: #1a0e0e;
            --bg3: #220f0f;
            --border: #3a1a1a;
            --border-hover: #6b2a2a;
            --accent: #e53e3e;
            --accent2: #c53030;
            --accent-glow: rgba(229, 62, 62, 0.35);
            --accent-soft: rgba(229, 62, 62, 0.15);
            --text: #f5e6e6;
            --text-muted: #9a7070;
            --text-dim: #6b4a4a;
            --green: #48bb78;
            --green-soft: rgba(72, 187, 120, 0.15);
            --yellow: #f6ad55;
            --yellow-soft: rgba(246, 173, 85, 0.15);
        }

        body {
            width: 400px;
            min-height: 570px;
            max-height: 670px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────────────── */
        .header {
            padding: 14px 18px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }

        .header-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            box-shadow: 0 4px 14px var(--accent-glow);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text);
        }

        .header-text p {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 1px;
        }

        /* ── Global Interval Config ─────────────────────────── */
        .interval-config {
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            background: var(--bg3);
        }

        .interval-config-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .interval-config-label .pill {
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 7px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .interval-config-input {
            width: 56px;
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            padding: 5px 4px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .interval-config-input::-webkit-outer-spin-button,
        .interval-config-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .interval-config-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .interval-config-select {
            flex: 1;
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 8px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .interval-config-select:focus { border-color: var(--accent); }

        .btn-save-interval {
            background: var(--accent-soft);
            border: 1px solid var(--accent);
            border-radius: 7px;
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 12px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            white-space: nowrap;
        }

        .btn-save-interval:hover { background: rgba(229, 62, 62, 0.25); }
        .btn-save-interval:active { transform: scale(0.96); }
        .btn-save-interval.saved {
            background: var(--green-soft);
            border-color: var(--green);
            color: var(--green);
        }

        .btn-test {
            background: rgba(246, 173, 85, 0.12);
            border: 1px solid var(--yellow);
            border-radius: 7px;
            color: var(--yellow);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 12px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            white-space: nowrap;
        }

        .btn-test:hover  { background: rgba(246, 173, 85, 0.22); }
        .btn-test:active { transform: scale(0.96); }
        .btn-test:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Add Tip Form ───────────────────────────────────── */
        .add-form {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-start;
            background: var(--bg2);
        }

        .tip-textarea {
            flex: 1;
            background: var(--bg3);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 400;
            padding: 9px 12px;
            outline: none;
            resize: none;
            height: 58px;
            line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .tip-textarea::placeholder { color: var(--text-dim); }
        .tip-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .btn-add-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 9px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            padding: 0 16px;
            height: 58px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s, height 0.2s;
            box-shadow: 0 3px 12px var(--accent-glow);
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .btn-add:hover { box-shadow: 0 4px 18px var(--accent-glow); opacity: 0.92; }
        .btn-add:active { transform: scale(0.96); }

        .btn-cancel {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 0 16px;
            height: 26px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-cancel:hover { background: var(--bg2); color: var(--text); border-color: var(--text-dim); }

        /* ── Tabs ───────────────────────────────────────────── */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
            padding: 0 18px;
        }

        .tab-btn {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            padding: 9px 12px 7px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.04em;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-btn:hover:not(.active) { color: var(--text); }

        .tab-badge {
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            min-width: 18px;
            text-align: center;
        }

        .tab-btn:not(.active) .tab-badge {
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
        }

        /* ── Tip List ───────────────────────────────────────── */
        .tip-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .tip-list::-webkit-scrollbar { width: 4px; }
        .tip-list::-webkit-scrollbar-track { background: transparent; }
        .tip-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 30px 20px;
            color: var(--text-dim);
        }

        .empty-state .empty-icon { font-size: 30px; opacity: 0.4; }
        .empty-state p { font-size: 12px; text-align: center; line-height: 1.6; }

        /* ── Tip Card ───────────────────────────────────────── */
        .tip-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s, background 0.2s;
            animation: fadeIn 0.22s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .tip-card:hover {
            border-color: var(--border-hover);
            background: var(--bg3);
        }

        .tip-card.inactive { opacity: 0.55; }

        .tip-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .tip-dot.active  { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
        .tip-dot.inactive { background: var(--text-dim); }

        .tip-text {
            flex: 1;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text);
            word-break: break-word;
        }

        .tip-card.inactive .tip-text { color: var(--text-muted); }

        .tip-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 7px;
            width: 27px;
            height: 27px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .icon-btn:hover.edit-btn    { background: rgba(255,255,255,0.1); border-color: var(--text-dim); color: var(--text); }
        .icon-btn:hover.toggle-btn  { background: var(--green-soft);  border-color: var(--green);  color: var(--green); }
        .icon-btn:hover.pause-btn   { background: var(--yellow-soft); border-color: var(--yellow); color: var(--yellow); }
        .icon-btn:hover.delete-btn  { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        /* ── Next Tip Banner ────────────────────────────────── */
        .next-tip-bar {
            padding: 7px 18px;
            border-top: 1px solid var(--border);
            background: var(--bg2);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .next-tip-bar .dot-pulse {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 4px var(--accent-glow); }
            50%       { opacity: 0.5; transform: scale(0.7); box-shadow: none; }
        }

        .next-tip-bar span { font-weight: 500; }
        .next-tip-bar .countdown-val {
            color: var(--accent);
            font-weight: 700;
            margin-left: 2px;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="header-icon">💡</div>
        <div class="header-text">
            <h1>Personal Tips</h1>
            <p>Reminders picked randomly from your active tips</p>
        </div>
    </div>

    <!-- Global Interval Config -->
    <div class="interval-config">
        <div class="interval-config-label">
            <span class="pill">Global</span>
            Show a tip every
        </div>
        <input id="interval-value" class="interval-config-input" type="number" min="1" max="999" value="30" />
        <select id="interval-unit" class="interval-config-select">
            <option value="60000">minutes</option>
            <option value="3600000" selected>hours</option>
            <option value="86400000">days</option>
        </select>
        <button id="btn-save-interval" class="btn-save-interval">Apply</button>
    </div>

    <!-- Ticker Scroll Speed Config -->
    <div class="interval-config">
        <div class="interval-config-label">
            <span class="pill">Speed</span>
            Ticker Scroll Spd
        </div>
        <input id="speed-value" class="interval-config-input" type="number" min="10" max="999" value="150" style="margin-right: 5px;" />
        <div class="interval-config-label" style="flex:1;">px/second</div>
        <button id="btn-save-speed" class="btn-save-interval">Apply</button>
    </div>

    <!-- Add Tip Form -->
    <div class="add-form">
        <textarea id="tip-input" class="tip-textarea" placeholder="Write a tip to remember…" maxlength="280"></textarea>
        <div class="btn-add-container">
            <button id="btn-add" class="btn-add">+ Add</button>
            <button id="btn-cancel" class="btn-cancel" style="display: none;">Cancel</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button id="tab-active" class="tab-btn active">
            Active <span id="badge-active" class="tab-badge">0</span>
        </button>
        <button id="tab-inactive" class="tab-btn">
            Inactive <span id="badge-inactive" class="tab-badge">0</span>
        </button>
        <div style="margin-left: auto; display: flex; align-items: center;">
            <select id="tag-filter" class="interval-config-select" style="padding: 4px 8px; font-size: 11px; margin-left: 10px; border-color: var(--border);">
                <option value="all">All Tags</option>
            </select>
        </div>
    </div>

    <!-- Tip List -->
    <div id="tip-list" class="tip-list"></div>

    <!-- Bottom Bar: Next tip countdown -->
    <div class="next-tip-bar">
        <div class="dot-pulse"></div>
        <span>Next random tip</span>
        <span id="global-countdown" class="countdown-val">—</span>
        <button id="btn-test" class="btn-test" style="margin-left: auto;">▶ Test</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
